<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Battle Regulations</title>

<style>

::-webkit-scrollbar {
    display: none;
}

/* Firefox */
html {
    scrollbar-width: none;
}

/* Internet Explorer/old Edge */
body {
    -ms-overflow-style: none;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;

    background: url("back.jpg") center/cover no-repeat fixed;
}

.navbar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: auto;
    z-index: 1000;
}

.navBg {
    width: 100%;
    height: 100%;
    display: block;
}

.navbar a {
    position: absolute;
    z-index: 1000;
}

.navbar a img {
    width: 240px;
    height: 120px;
    transition: transform 0.2s;
    cursor: pointer;
}

.navbar a img:hover {
    transform: scale(1.05);
}

.home {
    top: -8%;
    left: 15%;
}

.regulations {
    top: -8%;
    left: 25.5%;
}

.leaderboard {
    top: -8%;
    left: 36%;
}


.logo {
    position: fixed;
    top: 1%;
    left: -2;
    width: 250px;
    height:auto;
    z-index: 1000;
}

#musicGif {
    position: fixed;
    top: -9px;
    right: 10.5%;
    width: 75px;
    height: 75px;
    cursor: pointer;
    z-index: 1005;
    filter: brightness(0) invert(1);
}

#musicGif:hover {
    filter: brightness(0) saturate(100%) invert(87%) sepia(30%) saturate(2664%)
            hue-rotate(149deg) brightness(104%) contrast(98%);
}

.nowPlaying {
    position: fixed;
    top: 3.7%;
    right: 7.4%;
    width: 192px;
    height: 60px;
    overflow: hidden;
    display: none;
    align-items: center;
    padding: 5px;
        z-index: 1000;
}

.scroll-text {
    white-space: nowrap;
    color: white;
    font-size: 14px;
    animation: scrollLeft 6s linear infinite;
        z-index: 1001;
}

@keyframes scrollLeft {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.volumeContainer {
    position: fixed;
    top: 7.7%;
    right: 7.5%;
    width: 195px;
    z-index: 1000;
    display: flex;
    gap:5px;
}

#volumeIcon{
    width: 14px;
    height: 14px;
    object-ft: contain;}

#volumeSlider {
    --percent: 100%;

    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
}

#volumeSlider::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(
        to right,
        #67E8F9 0%,
        #67E8F9 var(--percent),
        rgba(255,255,255,0.2) var(--percent),
        rgba(255,255,255,0.2) 100%
    );
}

#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 0px;
    height: 0px;
}
.carousel {
    position: fixed;
    margin: 8% auto;
    right: 16%;
    width: 1280px;
    height: 720px;
    margin: 8% auto;
    overflow: hidden;
    background: url("BBR.png") center/cover no-repeat;
    border-radius: 10px;
}

.slides {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease;
}

.slide {
    min-width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.prev-btn, .next-btn {
    position: absolute;
    top: 45%;
    transform: translateY(-50%);
    width: 80px;
    height: 80px;
    cursor: pointer;
    z-index: 2000;
}

.prev-btn:hover, .next-btn:hover{
    transform: translateY(-50%) scale(1.05);
    }

.prev-btn {
    left: 35%;
}

.next-btn {
    right: 35%;
}

</style>
</head>

<body>

<div class="navbar">
    <img src="nav.png" class="navBg" alt="Navigation">

    <a href="index.html" class="home">
        <img id="homeBtn" src="B1.png" alt="Home">
    </a>

    <a href="regulations.html" class="regulations">
        <img id="regulationsBtn" src="B2.png" alt="Regulations">
    </a>

    <a href="leaderboard.html" class="leaderboard">
        <img id="leaderboardBtn" src="B3.png" alt="Leaderboard">
    </a>
</div>

<img src="BBLogo.png" class="logo" alt="Logo">

<img id="musicGif" src="visp.png" alt="music toggle">

<audio id="bgMusic" loop>
    <source src="AnotherMedium.m4a" type="audio/mpeg">
</audio>

<div id="nowPlaying" class="nowPlaying">
    <div class="scroll-text">Now Playing: Another Medium (UNDERTALE Soundtrack)</div>
</div>

<div id="volumeContainer" class="volumeContainer">
    <img src="volume.png" id="volumeIcon" alt="Volume">
    <input
        type="range"
        id="volumeSlider"
        min="0"
        max="1"
        step="0.01"
        value="1">
</div>

<div class="carousel">
    <div class="slides">
        <div class="slide"><img src="R1.png"></div>
        <div class="slide"><img src="R2.png"></div>
        <div class="slide"><img src="R3.png"></div>
        <div class="slide"><img src="R4.png"></div>
        <div class="slide"><img src="R5.png"></div>
        <div class="slide"><img src="R6.png"></div>
        <div class="slide"><img src="R7.png"></div>
        <div class="slide"><img src="R8.png"></div>
    </div>

    <img src="P.png" id="prev" class="prev-btn" alt="Prev">
    <img src="N.png" id="next" class="next-btn" alt="Next">

    <audio id="uiClick" preload="auto">
       <source src="page.wav" type="audio/wav">
    </audio>

</div>

<script>

const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicGif");
const nowPlaying = document.getElementById("nowPlaying");

const volumeSlider = document.getElementById("volumeSlider");

function updateVolume() {
    music.volume = parseFloat(volumeSlider.value);

    volumeSlider.style.setProperty(
        "--percent",
        `${volumeSlider.value * 100}%`
    );
}

volumeSlider.addEventListener("input", updateVolume);
updateVolume();

document.addEventListener("click", async () => {
    if (music.paused) {
        try {
            await music.play();
            btn.src = "vis.gif";
            nowPlaying.style.display = "flex";
        } catch (err) {
            console.log(err);
        }
    }
}, { once: true });

function addHover(id, normal, hover) {
    const btn = document.getElementById(id);

    btn.addEventListener("mouseenter", () => {
        btn.src = hover;
    });

    btn.addEventListener("mouseleave", () => {
        btn.src = normal;
    });
}

addHover("homeBtn", "B1.png", "B1a.png");
addHover("regulationsBtn", "B2.png", "B2a.png");
addHover("leaderboardBtn", "B3.png", "B3a.png");

btn.addEventListener("click", async (e) => {
    e.stopPropagation();

    if (music.paused) {
        await music.play();
        btn.src = "vis.gif";
        nowPlaying.style.display = "flex";
    } else {
        music.pause();
        btn.src = "visp.png";
        nowPlaying.style.display = "none";
    }
});

const slides = document.querySelector(".slides");
const slideItems = document.querySelectorAll(".slide");

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

const uiClick = document.getElementById("uiClick");
uiClick.volume=0.2;

function playClick() {
    uiClick.currentTime = 0;
    uiClick.play();
}

let currentSlide = 0;

function updateCarousel() {
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;

    prevBtn.style.opacity = currentSlide === 0 ? "0" : "1";
    nextBtn.style.opacity = currentSlide === slideItems.length - 1 ? "0" : "1";
}

nextBtn.addEventListener("click", () => {
    if (currentSlide < slideItems.length - 1) {
        currentSlide++;
        playClick();
        updateCarousel();
    }
});

prevBtn.addEventListener("click", () => {
    if (currentSlide > 0) {
        currentSlide--;
        playClick();
        updateCarousel();
    }
});

updateCarousel();

</script>

</body>
</html>
